services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meela
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "3005:3005"
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/meela"
    depends_on:
      postgres:
        condition: service_healthy

  migrations:
    image: ghcr.io/launchbadge/sqlx-cli:latest
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/meela"
    volumes:
      - ./backend/migrations:/migrations
    command: ["sqlx", "migrate", "run", "--source", "/migrations"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
